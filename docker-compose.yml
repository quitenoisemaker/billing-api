services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-app
    restart: unless-stopped
    working_dir: /var/webapps/app
    volumes:
      - .:/var/webapps/app
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REVERB_HOST=reverb
    depends_on:
      - db
      - redis
    networks:
      - billing-network

  web:
    image: nginx:alpine
    container_name: billing-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/webapps/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - billing-network

  db:
    image: mysql:8.0
    container_name: billing-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: billing_api
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - billing-network

  redis:
    image: redis:alpine
    container_name: billing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - billing-network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-reverb
    restart: unless-stopped
    working_dir: /var/webapps/app
    volumes:
      - .:/var/webapps/app
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REVERB_HOST=reverb
    depends_on:
      - app
      - redis
    networks:
      - billing-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-queue
    restart: unless-stopped
    working_dir: /var/webapps/app
    volumes:
      - .:/var/webapps/app
    command: php artisan queue:work redis
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REVERB_HOST=reverb
    depends_on:
      - app
      - redis
    networks:
      - billing-network

networks:
  billing-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
